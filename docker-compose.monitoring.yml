# ─────────────────────────────────────────────────────
# Smart Restaurant OS — Monitoring Stack (Optional)
# ─────────────────────────────────────────────────────
# Usage (overlay on top of production compose):
#   docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml \
#     --env-file .env.production up -d
#
# This adds Prometheus for metrics collection. Grafana can be
# added later for dashboards. See docs/monitoring.md.

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Optional: Grafana for dashboards ───────────────
  # Uncomment to add Grafana:
  #
  # grafana:
  #   image: grafana/grafana:11.0.0
  #   restart: unless-stopped
  #   environment:
  #     GF_SECURITY_ADMIN_USER: admin
  #     GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   ports:
  #     - "${GRAFANA_PORT:-3001}:3000"
  #   depends_on:
  #     - prometheus

  # ── Optional: Alertmanager for notifications ───────
  # Uncomment to add Alertmanager:
  #
  # alertmanager:
  #   image: prom/alertmanager:v0.27.0
  #   restart: unless-stopped
  #   volumes:
  #     - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
  #   ports:
  #     - "9093:9093"

volumes:
  prometheus-data:
  # grafana-data:
