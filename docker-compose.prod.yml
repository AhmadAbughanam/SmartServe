# ─────────────────────────────────────────────────────
# Smart Restaurant OS — Production Docker Compose
# ─────────────────────────────────────────────────────
# Usage:
#   cp .env.production.example .env.production
#   # Edit .env.production with real values
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# This file is separate from docker-compose.yml (dev infra only).

services:
  # ── Database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_restaurant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-smart_restaurant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host port exposed — only accessible within the Docker network

  # ── Cache ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Object Storage ──────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env.production}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # ── AI Services ──────────────────────────────────────
  ai:
    image: ${AI_IMAGE:-smart-restaurant-os-ai:local}
    build:
      context: .
      dockerfile: apps/ai-services/Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── API ──────────────────────────────────────────────
  api:
    image: ${API_IMAGE:-smart-restaurant-os-api:local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.production}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      STAFF_ACCESS_TOKEN_TTL: ${STAFF_ACCESS_TOKEN_TTL:-8h}
      STAFF_ACCESS_COOKIE_MAX_AGE_MS: ${STAFF_ACCESS_COOKIE_MAX_AGE_MS:-28800000}
      SMS_PROVIDER: ${SMS_PROVIDER:-twilio}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:8000}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_MODEL: ${HF_MODEL:-meta-llama/Llama-3.1-8B-Instruct:fastest}
      HF_BASE_URL: ${HF_BASE_URL:-https://router.huggingface.co/v1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-smart-restaurant}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env.production}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:?Set PAYMENT_WEBHOOK_SECRET in .env.production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GEOFENCING_ENABLED: ${GEOFENCING_ENABLED:-true}
      GEOFENCING_DEMO_BYPASS: ${GEOFENCING_DEMO_BYPASS:-false}
      GEOFENCING_DEFAULT_RADIUS_M: ${GEOFENCING_DEFAULT_RADIUS_M:-100}
      GEOFENCING_MAX_ACCURACY_M: ${GEOFENCING_MAX_ACCURACY_M:-1000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Web ──────────────────────────────────────────────
  web:
    image: ${WEB_IMAGE:-smart-restaurant-os-web:local}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy

  # ── Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ${NGINX_CONFIG_PATH:-./nginx/nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  redis-data:
  minio-data:
