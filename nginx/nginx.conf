# ─────────────────────────────────────────────────────
# Smart Restaurant OS — Nginx Reverse Proxy
# ─────────────────────────────────────────────────────
# Routes /api/* to the API service, everything else to the Web service.
# For HTTPS, see the commented sections below.

upstream api_backend {
    server api:4000;
}

upstream web_backend {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    # ── HTTPS placeholder ────────────────────────────
    # Uncomment and configure for TLS termination:
    #
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    # # Redirect HTTP to HTTPS
    # if ($scheme = http) {
    #     return 301 https://$host$request_uri;
    # }

    # ── Security headers ─────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API routes ───────────────────────────────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (keep-alive for Server-Sent Events)
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # ── Frontend routes ──────────────────────────────
    location / {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev, not needed in prod but harmless)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static file caching ──────────────────────────
    location /_next/static/ {
        proxy_pass http://web_backend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Health check endpoint ────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
