global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - "/etc/prometheus/alert-rules.yml"

scrape_configs:
  - job_name: "api-health"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://api:4000/api/health"]
        labels:
          service: "api"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: "api-metrics"
    static_configs:
      - targets: ["api:4000"]
    metrics_path: /api/metrics

  - job_name: "nginx-health"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://nginx/nginx-health"]
        labels:
          service: "nginx"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: "ai-health"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://ai:8000/health"]
        labels:
          service: "ai"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: "public-edge"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["https://nginx/nginx-health"]
        labels:
          service: "public-edge"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
